# Production stack for EC2: API only (Supabase is external).
# Set API_IMAGE_URI when running (GitHub Actions sets it on deploy via SSM).
#
# App listens on PORT (default 3000). Map host 3000 → container 3000 so each EC2
# instance exposes the API on :3000 only (security group + README).
#
# On the instance: place a .env file next to this compose file with production
# variables (see src/config/env.ts). Example path: /opt/lootcodes-api/.env

services:
  api:
    image: ${API_IMAGE_URI:?Set API_IMAGE_URI to the full ECR image URI}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
