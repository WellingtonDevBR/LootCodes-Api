# CI/CD: lint, test, Docker build; on main/dev — push to ECR and SSM deploy.
#
# Branches:
#   main → production (EC2_INSTANCE_IDS)
#   dev  → staging    (EC2_STAGING_INSTANCE_IDS)
#
# Repository: WellingtonDevBR/LootCodes-Api
# AWS: add this repo to the IAM OIDC trust policy for your deploy role, e.g.
#   "token.actions.githubusercontent.com:sub": "repo:WellingtonDevBR/LootCodes-Api:*"
#
# GitHub → Variables: AWS_REGION, ECR_REPOSITORY, EC2_INSTANCE_IDS,
#                     EC2_STAGING_INSTANCE_IDS, EC2_DEPLOY_DIR (optional)
# GitHub → Secrets:   AWS_ROLE_ARN

name: Backend CI / CD

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Docker build (verify)
        run: docker build -t lootcodes-api:ci .

  deploy:
    needs: [ci]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "env=staging" >> "$GITHUB_OUTPUT"
            echo "instance_ids=${{ vars.EC2_STAGING_INSTANCE_IDS }}" >> "$GITHUB_OUTPUT"
            echo "image_tag_extra=staging" >> "$GITHUB_OUTPUT"
          else
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "instance_ids=${{ vars.EC2_INSTANCE_IDS }}" >> "$GITHUB_OUTPUT"
            echo "image_tag_extra=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify AWS_ROLE_ARN secret
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "::error::Repository secret AWS_ROLE_ARN is missing or empty."
            echo "Add it under Settings → Secrets and variables → Actions → Secrets (not Variables)."
            echo "Value: arn:aws:iam::YOUR_ACCOUNT_ID:role/YOUR_OIDC_ROLE_NAME"
            exit 1
          fi
          case "$AWS_ROLE_ARN" in
            arn:aws:iam::*:role/*) ;;
            *)
              echo "::error::AWS_ROLE_ARN must look like arn:aws:iam::123456789012:role/RoleName"
              exit 1
              ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify EC2 targets exist in AWS_REGION and are SSM Online
        env:
          INSTANCE_IDS: ${{ steps.target.outputs.instance_ids }}
          DEPLOY_ENV: ${{ steps.target.outputs.env }}
        run: |
          echo "::notice::Deploying to $DEPLOY_ENV"
          if [ -z "$INSTANCE_IDS" ]; then
            echo "::error::No EC2 instance IDs for $DEPLOY_ENV. Set EC2_INSTANCE_IDS (production) or EC2_STAGING_INSTANCE_IDS (staging) in GitHub Variables."
            exit 1
          fi
          echo "Deploy role identity — EC2 must exist in this account and region:"
          aws sts get-caller-identity
          FAIL=0
          for id in $(echo "$INSTANCE_IDS" | tr ',' ' '); do
            id=$(echo "$id" | xargs)
            [ -z "$id" ] && continue

            errf=$(mktemp)
            set +e
            st=$(aws ec2 describe-instances \
              --region "$AWS_REGION" \
              --instance-ids "$id" \
              --query 'Reservations[0].Instances[0].State.Name' \
              --output text 2>"$errf")
            ec2_code=$?
            set -e
            if [ "$ec2_code" -ne 0 ]; then
              echo "::error::aws ec2 describe-instances failed for $id (exit $ec2_code)."
              cat "$errf" >&2 || true
              rm -f "$errf"
              FAIL=1
              continue
            fi
            rm -f "$errf"

            if [ "$st" = "None" ] || [ -z "$st" ]; then
              echo "::error::EC2 $id not visible in $AWS_REGION."
              FAIL=1
              continue
            fi
            if [ "$st" != "running" ]; then
              echo "::error::EC2 $id is not running (state: $st)."
              FAIL=1
              continue
            fi

            ssm_err=$(mktemp)
            set +e
            ping=$(aws ssm describe-instance-information \
              --region "$AWS_REGION" \
              --filters "Key=InstanceIds,Values=$id" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>"$ssm_err")
            ssm_code=$?
            set -e
            if [ "$ssm_code" -ne 0 ]; then
              echo "::error::ssm:DescribeInstanceInformation failed for $id (exit $ssm_code)."
              cat "$ssm_err" >&2 || true
              rm -f "$ssm_err"
              FAIL=1
              continue
            fi
            rm -f "$ssm_err"
            if [ "$ping" = "Online" ]; then
              echo "OK: $id running, SSM PingStatus=Online"
            else
              echo "::error::SSM: $id is not Online (status: ${ping:-not registered})."
              FAIL=1
            fi
          done
          exit "$FAIL"

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
          EXTRA_TAG: ${{ steps.target.outputs.image_tag_extra }}
        run: |
          if [ -z "$REPO" ]; then
            echo "Set GitHub variable ECR_REPOSITORY to your ECR repository name."
            exit 1
          fi
          IMAGE="${REGISTRY}/${REPO}"
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:${EXTRA_TAG}" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:${EXTRA_TAG}"
          echo "uri=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2 via SSM (${{ steps.target.outputs.env }})
        env:
          FULL_IMAGE: ${{ steps.image.outputs.uri }}
          INSTANCE_IDS: ${{ steps.target.outputs.instance_ids }}
          EC2_DEPLOY_DIR: ${{ vars.EC2_DEPLOY_DIR }}
          DEPLOY_ENV: ${{ steps.target.outputs.env }}
        run: |
          if [ -z "$INSTANCE_IDS" ]; then
            echo "Set EC2_INSTANCE_IDS or EC2_STAGING_INSTANCE_IDS in GitHub Variables."
            exit 1
          fi
          python3 << 'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          region = os.environ["AWS_REGION"]
          image = os.environ["FULL_IMAGE"]
          deploy_dir = os.environ.get("EC2_DEPLOY_DIR") or "/opt/lootcodes-api"
          deploy_env = os.environ.get("DEPLOY_ENV", "unknown")
          raw = os.environ.get("INSTANCE_IDS", "")
          instances = [x.strip() for x in raw.replace(",", " ").split() if x.strip()]
          if not instances:
              print("No instance IDs", file=sys.stderr)
              sys.exit(1)

          commands = [
              "set -euo pipefail",
              f"export API_IMAGE_URI={image}",
              f"export AWS_DEFAULT_REGION={region}",
              'REGISTRY=$(echo "$API_IMAGE_URI" | cut -d/ -f1)',
              'aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$REGISTRY"',
              f"cd {deploy_dir}",
              "docker compose -f docker-compose.prod.yml pull",
              "docker compose -f docker-compose.prod.yml up -d --remove-orphans",
          ]

          params = {"commands": commands}
          with open("/tmp/ssm-params.json", "w", encoding="utf-8") as f:
              json.dump(params, f)

          sha = (os.environ.get("GITHUB_SHA") or "")[:7]
          send_cmd = [
              "aws",
              "ssm",
              "send-command",
              "--region",
              region,
              "--document-name",
              "AWS-RunShellScript",
              "--comment",
              f"lootcodes-api {deploy_env} deploy {sha}",
              "--parameters",
              "file:///tmp/ssm-params.json",
              "--instance-ids",
              *instances,
              "--output",
              "text",
              "--query",
              "Command.CommandId",
          ]
          cmd_id = subprocess.check_output(send_cmd, text=True).strip()
          print(f"SSM CommandId: {cmd_id}")

          deadline = time.time() + 600
          while time.time() < deadline:
              lst_cmd = [
                  "aws",
                  "ssm",
                  "list-command-invocations",
                  "--region",
                  region,
                  "--command-id",
                  cmd_id,
                  "--details",
                  "--output",
                  "json",
              ]
              data = json.loads(subprocess.check_output(lst_cmd, text=True))
              invs = data.get("CommandInvocations") or []
              if not invs:
                  time.sleep(5)
                  continue

              statuses = [i.get("Status") for i in invs]
              print("Statuses:", statuses)

              if all(s == "Success" for s in statuses):
                  sys.exit(0)
              if any(s in ("Failed", "Cancelled", "TimedOut") for s in statuses):
                  for inv in invs:
                      if inv.get("Status") != "Success":
                          err = inv.get("StandardErrorContent") or inv.get("StatusDetails") or inv
                          print(err, file=sys.stderr)
                  sys.exit(1)

              time.sleep(5)

          print("Timed out waiting for SSM command", file=sys.stderr)
          sys.exit(1)
          PY

  smoke-test:
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instances
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "instance_ids=${{ vars.EC2_STAGING_INSTANCE_IDS }}" >> "$GITHUB_OUTPUT"
            echo "env=staging" >> "$GITHUB_OUTPUT"
          else
            echo "instance_ids=${{ vars.EC2_INSTANCE_IDS }}" >> "$GITHUB_OUTPUT"
            echo "env=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check via SSM
        env:
          INSTANCE_IDS: ${{ steps.target.outputs.instance_ids }}
          DEPLOY_ENV: ${{ steps.target.outputs.env }}
        run: |
          echo "Running smoke test on $DEPLOY_ENV..."
          for id in $(echo "$INSTANCE_IDS" | tr ',' ' '); do
            id=$(echo "$id" | xargs)
            [ -z "$id" ] && continue

            CMD_ID=$(aws ssm send-command \
              --region "$AWS_REGION" \
              --document-name AWS-RunShellScript \
              --comment "smoke-test health" \
              --parameters '{"commands":["curl -sf http://localhost:3000/health || exit 1"]}' \
              --instance-ids "$id" \
              --output text \
              --query 'Command.CommandId')

            echo "Smoke test CommandId: $CMD_ID (instance $id)"

            for attempt in $(seq 1 12); do
              sleep 5
              STATUS=$(aws ssm list-command-invocations \
                --region "$AWS_REGION" \
                --command-id "$CMD_ID" \
                --details \
                --output json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          invs=d.get('CommandInvocations',[])
          if invs:
            print(invs[0].get('Status','Pending'))
          else:
            print('Pending')
          ")
              echo "  attempt $attempt: $STATUS"
              if [ "$STATUS" = "Success" ]; then
                echo "Health check passed for $id"
                break
              fi
              if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
                echo "::error::Health check failed on $id ($DEPLOY_ENV)"
                exit 1
              fi
            done

            if [ "$STATUS" != "Success" ]; then
              echo "::error::Health check timed out on $id ($DEPLOY_ENV)"
              exit 1
            fi
          done
          echo "All smoke tests passed for $DEPLOY_ENV"
